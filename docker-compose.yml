version: '3.9'

services:
  mail2whatsapp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mail2whatsapp
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - PG_HOST=postgres
      - PG_USER=user
      - PG_PASSWORD=password
      - PG_DATABASE=mail2whatsapp
      - PG_PORT=5432
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:13
    container_name: postgres_db
    restart: unless-stopped
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mail2whatsapp
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mail2whatsapp"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
